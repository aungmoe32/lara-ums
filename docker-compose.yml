services:
    # Laravel Application
    app:
        # define the build context here, but NOT the target (see overrides)
        build:
            context: .
        container_name: app
        restart: unless-stopped
        working_dir: /var/www
        networks:
            - laravel
        depends_on:
            - mysql
            - redis

    nginx:
        image: nginx:alpine
        container_name: nginx
        restart: unless-stopped
        # ports:
        # define the generic internal mapping here
        # The external port (80 vs 8080) is handled in overrides
        # - "80"
        volumes:
            - ./docker/nginx/conf.d/:/etc/nginx/conf.d/
            # Nginx needs to see public files (we mount them differently in Dev vs Prod)
        networks:
            - laravel
        depends_on:
            - app

    # The Database
    mysql:
        image: mysql:8.0
        container_name: mysql
        restart: always
        environment:
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
            # MYSQL_PASSWORD: ${DB_PASSWORD}
            # MYSQL_USER: ${DB_USERNAME}
        volumes:
            - db_data:/var/lib/mysql
            # Mount the local init_scripts directory to the container's initialization directory
            - ./mysql-multidb/init_scripts:/docker-entrypoint-initdb.d
        networks:
            - laravel
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            interval: 5s
            timeout: 5s
            retries: 10

    # The Cache
    redis:
        image: redis:alpine
        container_name: redis
        networks:
            - laravel

    phpmyadmin:
        image: phpmyadmin/phpmyadmin
        restart: always
        ports:
            - "9000:80"
        environment:
            PMA_HOST: mysql
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
        depends_on:
            - mysql
        networks:
            - laravel

    bugsink:
        image: bugsink/bugsink:2
        depends_on:
            mysql:
                condition: service_healthy
        restart: unless-stopped
        ports:
            - "8000:8000"
        environment:
            SECRET_KEY: ${BUGSINK_SECRET_KEY} # e.g. openssl rand -base64 50
            CREATE_SUPERUSER: ${BUGSINK_CREATE_SUPERUSER} # format: username:password (remove after first run)
            PORT: 8000
            DATABASE_URL: mysql://${DB_USERNAME}:${DB_PASSWORD}@mysql:3306/${BUGSINK_DB} # Change password to match POSTGRES_PASSWORD above
            BEHIND_HTTPS_PROXY: "true" # Change this for setups behind a proxy w/ ssl enabled
            BASE_URL: "http://bugsink:8000"
            ALLOWED_HOSTS: "localhost,bugsink,127.0.0.1,${BUGSINK_HOST}"
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    'python -c ''import requests; requests.get("http://localhost:8000/").raise_for_status()''',
                ]
            interval: 5s
            timeout: 20s
            retries: 10
        networks:
            - laravel

networks:
    laravel:
        driver: bridge

volumes:
    db_data:
